<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <title>Login de Acesso</title>
</head>
<body>
    <main id="conteudo">
        <form class="form-login">
            <label>Digite seu E-mail:</label>
            <input type="email" name="email" placeholder="Digite aqui..." class="camp-form">

            <label>Digite sua Senha:</label>
            <input type="password" name="senha" placeholder="Digite aqui..." class="camp-form">

            <button name="btnAcessar" class="btnAcessar">Acessar</button>
        </form>
    </main>
</body>
</html>
