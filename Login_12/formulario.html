<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Loging de Acesso</title>
</head>
<body>
    <form>
        <h1>Faça seu Login de Acesso:</h1>
        <div class="box-form">
            <label>Digite seu E-mail:</label>
            <input type="email" class="camp-login" placeholder="Digite aqui...">

            <label>Digite sua Senha:</label>
            <input type="password" class="camp-login" placeholder="Digite aqui...">

            <button class="btn-login">Acessar</button>
        </div>
    </form>
</body>
</html>
