<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login de Acesso</title>

    <style>
        body{
            padding: 0px;
            margin: 0px;
            border: 0px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Tahoma;
            height: 100vh;
            background-color: #bebebe;
        }

        form{
            background-color: #272727;
            color: #ffffff;
            padding: 42px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
        }

        label{
            margin-bottom: 6px;
            font-size: 18px;
        }

        input{
            width: 480px;
            height: 35px;
            outline: none;
            border: none;
            border-radius: 4px;
            margin-bottom: 26px;
        }

        button{
            height: 35px;
            outline: none;
            border: none;
            border-radius: 4px;
            margin-bottom: 26px;
            background-color: #008100;
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover{
            background-color: #004e00;
        }
    </style>

</head>
<body>
    <form>
        <label>Digite seu E-mail:</label>
        <input type="email" placeholder="Digite aqui...">
        <br>
        <label>Digite sua Senha:</label>
        <input type="password" placeholder="Digite aqui...">
        <br>
        <button>Acessar</button>
    </form>
</body>
</html>
