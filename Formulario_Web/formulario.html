<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Web</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body id="page-home">
    <header>
        <h1 class="title">Formulários Web.</h1>
    </header>

    <main id="container">
        <section class="form">
            <form>
                <label>Digite seu E-mail:</label>
                <input type="email" name="email" placeholder="Digite aqui..." class="camp-form">

                <label>Digite sua Senha:</label>
                <input type="password" name="senha" placeholder="Digite aqui..." class="camp-form">

                <button name="btnAcessar" class="btnAcessar">Acessar</button>
            </form>

            <form>
                <label>Digite seu Nome:</label>
                <input type="text" name="nome" placeholder="Digite aqui..." class="camp-form">

                <label>Digite seu E-mail:</label>
                <input type="email" name="email" placeholder="Digite aqui..." class="camp-form">

                <label>Digite sua Senha:</label>
                <input type="password" name="senha" placeholder="Digite aqui..." class="camp-form">

                <label>Repita sua Senha:</label>
                <input type="password" name="senha" placeholder="Digite aqui..." class="camp-form">

                <label>Selecione sua Data de Aniversário:</label>
                <input type="date" name="data" class="camp-form">
                
                <label>Selecione seu Curso:</label>
                <select class="camp-form">
                    <option value="">Selecione</option>
                    <option value="">Análise e Desenvolvimento de Sistemas</option>
                    <option value="">Engenharia de Software</option>
                    <option value="">Ciências da Computação</option>
                </select>

                <button name="btnCadastrar" class="btnCadastrar">Cadastrar</button>
            </form>
        </section>
    </main>

    <footer id="end">
        <h2>Todos os direitos reservados 2025.</h2>
    </footer>
</body>
</html>
