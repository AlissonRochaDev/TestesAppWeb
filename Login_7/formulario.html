<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Login</title>

    <style>
        body{
            padding: 0px;
            margin: 0px;
            border: 0px;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #670059;
        }

        .box-form{
            background-color: #161616;
            color: #ffffff;
            border-radius: 4px;
            padding: 48px;
        }

        form{
            display: flex;
            flex-direction: column;
        }

        label{
            font-family: Tahoma;
            margin-bottom: 10px;
        }

        input{
            width: 360px;
            height: 35px;
            border: none;
            border-radius: 4px;
            margin-bottom: 26px;
        }

        .btnAcessar{
            background-color: #008000;
            color: #ffffff;
            height: 35px;
            border: none;
            border: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="box-form">
        <form>
            <label>Digite seu E-mail:</label>
            <input type="email" placeholder="Digite aqui...">
            
            <label>Digite sua Senha:</label>
            <input type="password" placeholder="Digite aqui...">

            <button type="submit" name="btnAcessar" class="btnAcessar">Acessar</button>
        </form>
    </div>
</body>
</html>
