<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Formulário</title>
</head>
<body>
    <form action="" method="">
        <label>Digite seu Nome:</label>
        <input type="text" name="nome" placeholder="Digite seu Nome aqui..." class="campForm">
        <br>
        <label>Digite seu E-mail:</label>
        <input type="email" name="nome" placeholder="Digite seu E-mail aqui..." class="campForm">
        <br>
        <label>Digite um Assunto:</label>
        <input type="text" name="nome" placeholder="Digite seu E-mail aqui..." class="campForm">
        <br>
        <label>Sua data de nascimento:</label>
        <input type="date" name="aniversario" class="campForm">
        <br>
        <label>Digite sua Mensagem:</label>
        <textarea name="msg" placeholder="Digite sua Mensagem aqui..." class="campFormMsg"></textarea>
        <br>
        <button name="btnEnviar" class="btnEnviar">ENVIAR</button>
    </form>
</body>
</html>
