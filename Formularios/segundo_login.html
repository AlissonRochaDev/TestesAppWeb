<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício</title>
    <style>
        #page{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #c7c7c7;
        }

        h1{
            font-size: 20px;
        }

        .campo{
            border: none;
            border-radius: 4px;
            width: 260px;
            height: 30px;
            margin-bottom: 20px;
        }

        .btn{
            width: 90px;
            height: 30px;
            border: none;
            border-radius: 4px;
            background-color: #004b00;
            color: #ffffff;
            cursor: pointer;
        }

        .btn:hover{
            background-color: #006e00;
        }
    </style>
</head>
<body id="page">
    <h1>Exercício de Desenvolvimento Front-End.</h1>
    <hr>
    <form>
        <label>Digite seu E-mail:</label>
        <br>
        <input type="email" class="campo" placeholder="Digite seu E-mail aqui...">
        <br>
        <label>Digite sua Senha:</label>
        <br>
        <input type="password" class="campo" placeholder="Digite sua Senha aqui...">
        <br>
        <button class="btn">ACESSAR</button>
    </form>
</body>
</html>
