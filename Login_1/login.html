<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body>
    <h1>Acesso de Conta - Login:</h1>
    <form>
        <label>Digite seu E-mail:</label>
        <input type="email" name="email" placeholder="Digite seu E-mail aqui...">
        <label>Digite sua Senha:</label>
        <input type="password" name="senha" placeholder="Digite sua Senha aqui...">
        <button name="btnAcessar" class="btnAcessar">Acessar</button>
    </form>
</body>
</html>
