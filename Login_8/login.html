<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login - Acessar Conta</title>
</head>
<body>
    <header id="topo">
        <h1>Faça seu Login de acesso, preenchendo todos os dados.</h1>
    </header>

    <main id="form-login">
        <form>
            <label>Digite seu E-mail:</label>
            <input type="email" name="email" placeholder="Digite aqui..." class="camp-form">
            
            <label>Digite sua Senha:</label>
            <input type="password" name="senha" placeholder="Digite aqui..." class="camp-form">

            <button name="btnAcessar" class="btnAcessar">Acessar</button>
        </form>
    </main>

    <footer id="end">
        <span>Todos os direitos reservados - Londrina 2025.</span>
    </footer>
</body>
</html>
