<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Conta</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Cadastro de Conta</h1>
        <form action="#" method="POST">

            <label for="nome">Nome completo:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite aqui..." required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="Digite aqui..." required>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" placeholder="Digite aqui..." required>

            <label for="nascimento">Data de Nascimento:</label>
            <input type="date" id="nascimento" name="nascimento">

            <label for="genero">Gênero:</label>
            <div class="radio-group">
                <label><input type="radio" name="genero" value="masculino"> Masculino</label>
                <label><input type="radio" name="genero" value="feminino"> Feminino</label>
                <label><input type="radio" name="genero" value="outro"> Outro</label>
            </div>

            <label for="estado">Estado:</label>
            <select id="estado" name="estado">
                <option value="">Selecione</option>
                <option value="pr">Paraná</option>
                <option value="sp">São Paulo</option>
                <option value="rj">Rio de Janeiro</option>
                <option value="mg">Minas Gerais</option>
            </select>

            <label>Interesses:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="interesses[]" value="tecnologia"> Tecnologia</label>
                <label><input type="checkbox" name="interesses[]" value="esportes"> Esportes</label>
                <label><input type="checkbox" name="interesses[]" value="viagens"> Viagens</label>
                <label><input type="checkbox" name="interesses[]" value="cultura"> Cultura</label>
            </div>

            <label for="bio">Fale um pouco sobre você:</label>
            <textarea id="bio" name="bio" rows="5"></textarea>

            <button type="submit">Cadastrar</button>
        </form>
    </div>

</body>

</html>
