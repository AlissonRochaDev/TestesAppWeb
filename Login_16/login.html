<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login de Acesso</title>
    <style>
        /* Código CSS: Estilização! */
        body{
            padding: 0px;
            margin: 0px;
            border: 0px;
            background-color: #282828;
            color: #ffffff;
            display: flex;
            justify-content: center;
        }

        div{
            background-color: #ffffff;
            color: #000000;
            padding: 28px;
            font-family: Tahoma;
            border-radius: 6px;
            margin-top: 260px;
            box-shadow: 2px 2px 4px #848484;
        }

        form{
            display: flex;
            flex-direction: column;
        }

        label{
            margin-bottom: 6px;
        }

        input{
            width: 365px;
            height: 35px;
            outline: none;
            border-radius: 6px;
            margin-bottom: 32px;
        }

        button{
            height: 35px;
            background-color: #004a00;
            color: #ffffff;
            cursor: pointer;
            border: none;
            border-radius: 6px;
        }

        button:hover{
            background-color: #008900;
        }
    </style>
</head>
<body>
    <div>
        <form>
            <label>Digite seu E-mail:</label>
            <input type="email" placeholder="Digite aqui...">
            <br>
            <label>Digite sua Senha:</label>
            <input type="password" placeholder="Digite aqui...">
            <br>
            <button>Acessar</button>
        </form>
    </div>
</body>
</html>
