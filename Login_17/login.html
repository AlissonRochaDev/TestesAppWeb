<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>Login de Acesso</title>
</head>
<body>
    <h1>Faça seu Login de Acesso aqui!</h1>

    <form>
        <label>Digite seu E-mail:</label>
        <input type="email" placeholder="Digite seu E-mail aqui..." class="camp-form">
        <br>
        <label>Digite sua Senha:</label>
        <input type="password" placeholder="Digite sua Senha aqui..." class="camp-form">
        <br>
        <button name="btnAcessar" class="btnAcessar">Acessar</button>
    </form>
</body>
</html>
